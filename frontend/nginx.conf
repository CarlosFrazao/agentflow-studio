# Mapa necessário para upgrade de WebSocket (Connection: upgrade somente em WS).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy da API do backend (inclui upgrade de WebSocket para /api/v1/share/{id}/ws)
    location /api/ {
        proxy_pass http://agentflow-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $http_x_request_id;
        # WebSocket upgrade: sem isso o handshake cai em 200 em vez de 101,
        # quebrando o connectShareWs (FEAT-003) no container nginx.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}

# Alembic configuration for AgentFlow Studio backend.
#
# sqlalchemy.url fica vazio de propósito: o env.py lê a DATABASE_URL real de
# app.core.config.Settings (variável de ambiente), então a mesma URL usada pela
# aplicação é usada pelas migrações (dev/teste/produção).

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
